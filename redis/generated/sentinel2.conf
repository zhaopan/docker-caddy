# Redis Sentinel Configuration Template
port 26379
daemonize no
pidfile "/var/run/redis-sentinel.pid"
logfile ""
dir "/data"
protected-mode no
bind 0.0.0.0
loglevel notice

# 核心监控配置 - 由 Makefile 动态注入 IP
sentinel myid b3ec9426b9d5801a365415192f7fc484da40ded5
sentinel deny-scripts-reconfig yes
sentinel monitor redis-master 172.18.0.4 6379 2
sentinel down-after-milliseconds redis-master 5000

client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
# Generated by CONFIG REWRITE
sentinel failover-timeout redis-master 10000
sentinel auth-pass redis-master redis-pwd
sentinel config-epoch redis-master 0
sentinel leader-epoch redis-master 0
sentinel known-replica redis-master 172.18.1.1 6379
sentinel known-replica redis-master 172.18.1.3 6379
sentinel known-sentinel redis-master 172.18.1.9 26379 868bcb8d714709a3c2f4d53af939f67ae2f34d8c
sentinel known-sentinel redis-master 172.18.1.5 26379 97aff868a2fecaa529227cf502e4345135a04381
sentinel current-epoch 0
