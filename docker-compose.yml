#/etc/hosts
x-hosts: &hosts
  extra_hosts:
    - host.docker.internal:host-gateway
    - default.dev.com:${PROXY_IP}
    - dev.com:${PROXY_IP}
    - www.dev.com:${PROXY_IP}
    - api.dev.com:${PROXY_IP}
    - admin.dev.com:${PROXY_IP}
    - grpc.dev.com:${PROXY_IP}

services:
  ######## proxy (Standard) ########
  proxy:
    build:
      context: ./caddy
      args:
        - CADDY_VERSION=${CADDY_VERSION}
    image: ${AUTHOR}/${CADDY_NAME}:${CADDY_VERSION}
    container_name: ${CADDY_NAME}
    hostname: proxy
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # 用于支持 HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/conf.d:/etc/caddy/conf.d
      - caddy_data:/data/caddy # 证书与元数据
      - caddy_config:/config/caddy # 运行时配置
      - caddy_logs:/logs # 日志目录
      - caddy_www:/var/www/html # 静态资源目录
    networks:
      backend:
        ipv4_address: ${PROXY_IP}
    restart: unless-stopped
    <<: *hosts

  ######## redis (Standard) ########
  redis:
    build:
      context: ./redis
      # args:
      #   - REDIS_VER=${REDIS_VERSION}
    image: ${AUTHOR}/${REDIS_NAME}:${REDIS_VERSION}
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
      - "${REDIS_REDISINSIGHT_PORT}:8001"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      backend:
        ipv4_address: ${REDIS_IP}
    restart: unless-stopped
    <<: *hosts

  ######## mysql ########
  mysql:
    build:
      context: ./mysql
      args:
        - MYSQL_VERSION=${MYSQL_VERSION}
    image: ${AUTHOR}/${MYSQL_NAME}:${MYSQL_VERSION}
    container_name: ${MYSQL_NAME}
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=${MYSQL_TIMEZONE}
    volumes:
      - ${MYSQL_CONF_PATH}:/etc/mysql/conf.d/docker.cnf:ro
      - ./data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    ports:
      - ${MYSQL_PORT}:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      backend:
        ipv4_address: ${MYSQL_IP}
    <<: *hosts

  ######## mongo ########
  mongo:
    build:
      context: ./mongo
      args:
        - MONGO_VERSION=${MONGO_VERSION}
    image: ${AUTHOR}/${MONGO_NAME}:${MONGO_VERSION}
    container_name: ${MONGO_NAME}
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - ${MONGO_CONF_PATH}:/etc/mongod.conf:ro
      - ./data/mongo/db:/data/db
      - ./data/mongo/configdb:/data/configdb
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.4"]
    deploy:
      resources:
        limits:
          memory: 400MB
    ports:
      - ${MONGO_PORT}:27017
    networks:
      backend:
        ipv4_address: ${MONGO_IP}
    <<: *hosts

  ######## grpc #########
  grpc:
    build:
      context: ./grpc
    image: ${AUTHOR}/${GRPC_NAME}:${GRPC_VERSION}
    container_name: ${GRPC_NAME}
    restart: unless-stopped
    ports:
      - "${GRPC_PORT}:80"
    volumes:
      - grpc_data:/app
    networks:
      - backend
    <<: *hosts

  ######## n8n ########
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - ${N8N_PORT}:5678
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # 时区
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai

      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_HOST=ollama

      # 开启二进制数据存储目录迁移
      - N8N_MIGRATE_FS_STORAGE_PATH=true

      # 加解密套件
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto

      # 文件访问
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      - N8N_BLOCK_FS_READ_ACCESS=false
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODES_EXCLUDE=[]
      - N8N_PROXY_HOPS=1
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n/userfiles

      # 数据库配置
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${PG_DB}
      - DB_POSTGRESDB_USER=${PG_USER}
      - DB_POSTGRESDB_PASSWORD=${PG_PASSWORD}
      - DB_POSTGRESDB_POOL_SIZE=10

      # 外部访问配
      - N8N_PROTOCOL=https
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=https://${N8N_HOST}/

      # 安全配置
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS}
      - N8N_ENCRYPTION_KEY=${N8N_KEY}
      - NODE_ENV=production

      # 安全/兼容性
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true

      # 并发
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=20
      - N8N_EXECUTIONS_MODE=queue
      - N8N_QUEUE_MODE=true
      - QUEUE_BULL_REDIS_HOST=redis

      # CORS 配置
      - N8N_CORS_ENABLED=true
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_CORS_ALLOWED_METHODS=GET,POST,PUT,PATCH,DELETE
      - N8N_CORS_ALLOWED_HEADERS=*
    links:
      - redis
      - postgres
      - mysql
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - backend
    <<: *hosts

  ######## ollama ########
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4 # 开启 4 并行
      - OLLAMA_KEEP_ALIVE=-1 # 模型常驻内存，不释放
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia # 确保这一步，GPU 加速对速度影响巨大
    #           count: all
    #           capabilities:
    #             [
    #               gpu,
    #             ]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: serve
    networks:
      - backend
    <<: *hosts

  ######## postgres ########
  postgres:
    # 原生 postgres
    # build:
    #   context: ./postgres
    #   args:
    #     - PG_VERSION=${PG_VERSION}
    image: pgvector/pgvector:${PG_VERSION}
    container_name: ${PG_NAME}
    ports:
      - ${PG_PORT}:5432
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    <<: *hosts

  ######## openclaw ########
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    pull_policy: if_not_present
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    command: ["openclaw", "gateway", "--allow-unconfigured"]
    volumes:
      - ./data/openclaw:/home/node/.openclaw
    environment:
      - TZ=Asia/Shanghai
      # - OPENCLAW_GATEWAY_MODE=local
      # - OPENCLAW_GATEWAY_BIND=0.0.0.0
      # - OPENCLAW_GATEWAY_HOST=0.0.0.0
      # - OPENCLAW_GATEWAY_PORT=18789
    links:
      - redis
      - postgres
      - mysql
      - n8n
    networks:
      - backend
    <<: *hosts

networks:
  backend:
    name: backend
    external: true

volumes:
  caddy_data:
    name: caddy_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CADDY_ROOT}/data
  caddy_config:
    name: caddy_config
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CADDY_ROOT}/config
  caddy_logs:
    name: caddy_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CADDY_ROOT}/logs
  caddy_www:
    name: caddy_www
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/www
  grpc_data:
    name: grpc_data
  mongo_data:
    name: mongo_data
  n8n_data:
    name: n8n_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${N8N_PATH}
